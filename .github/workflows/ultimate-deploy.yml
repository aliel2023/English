name: Ultimate AI Optimization & Deploy

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      skip_lighthouse:
        description: 'Skip Lighthouse CI'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  quality:
    name: Quality & Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: AZ Grammar Check
        run: |
          echo "=== Checking Azerbaijani text quality ==="
          WRONG_WORDS=("qramer" "gramotika" "sehfe" "melumat" "elave" "xususin" "abune")
          FOUND=0
          for word in "${WRONG_WORDS[@]}"; do
            if grep -rli "$word" --include="*.html" --include="*.json" . 2>/dev/null; then
              echo "WARNING: Found possible misspelling: '$word'"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 0 ]; then
            echo "No obvious AZ spelling issues found"
          fi

      - name: HTML Structure Check
        run: |
          echo "=== Checking HTML files ==="
          for f in *.html; do
            if grep -q '<img' "$f"; then
              IMG_COUNT=$(grep -c '<img' "$f" || true)
              ALT_COUNT=$(grep -c 'alt=' "$f" || true)
              echo "  $f: $IMG_COUNT images, $ALT_COUNT with alt"
            fi
          done

      - name: Security Headers Verify
        run: |
          if [ -f "_headers" ]; then
            echo "_headers file exists"
            grep -q "X-Frame-Options" _headers && echo "OK: X-Frame-Options" || echo "MISSING: X-Frame-Options"
            grep -q "Content-Security-Policy" _headers && echo "OK: CSP" || echo "MISSING: CSP"
            grep -q "Strict-Transport-Security" _headers && echo "OK: HSTS" || echo "MISSING: HSTS"
          fi

      - name: Firestore Rules Syntax Check
        run: |
          echo "=== Checking Firestore rules syntax ==="
          if [ -f "firestore.rules" ]; then
            echo "firestore.rules found"
            # Check for basic structure
            grep -q "rules_version" firestore.rules && echo "OK: rules_version present" || echo "WARNING: rules_version missing"
            grep -q "isAdmin()" firestore.rules && echo "OK: isAdmin() function present" || echo "WARNING: isAdmin() missing"
            grep -q "premium" firestore.rules && echo "OK: premium field rules present" || echo "WARNING: premium rules missing"
            LINE_COUNT=$(wc -l < firestore.rules)
            echo "Total lines: $LINE_COUNT"
          else
            echo "WARNING: firestore.rules not found!"
          fi

  deploy-firebase:
    name: Deploy Firestore Rules
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore Security Rules
        run: firebase deploy --only firestore:rules --project alielenglish --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        continue-on-error: true

      - name: Firebase Deploy Status
        run: echo "Firestore rules deploy completed (check above for errors)"

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: quality
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install optimization tools
        run: npm install -g html-minifier-terser clean-css-cli terser

      - name: Create dist directory
        run: |
          mkdir -p dist
          cp -r *.html styles scripts i18n assets sw.js dist/ 2>/dev/null || true
          cp -r _headers dist/ 2>/dev/null || true
          cp sitemap.xml robots.txt dist/ 2>/dev/null || true

      - name: Minify CSS
        run: |
          echo "=== Minifying CSS ==="
          for f in dist/styles/*.css; do
            [ -f "$f" ] || continue
            ORIG=$(stat -c%s "$f")
            cleancss -o "$f" "$f" 2>/dev/null || true
            NEW=$(stat -c%s "$f")
            echo "  $f: ${ORIG}B -> ${NEW}B"
          done

      - name: Minify JS
        run: |
          echo "=== Minifying JS ==="
          for f in dist/scripts/*.js; do
            [ -f "$f" ] || continue
            [[ "$f" == *".min.js" ]] && continue
            # Skip ES modules - they have special syntax
            [[ "$f" == *"auth.js" ]] && { echo "  SKIP $f (ES module)"; continue; }
            ORIG=$(stat -c%s "$f")
            terser "$f" -o "$f" --compress --mangle 2>/dev/null || true
            NEW=$(stat -c%s "$f")
            echo "  $f: ${ORIG}B -> ${NEW}B"
          done

      - name: Minify HTML
        run: |
          echo "=== Minifying HTML ==="
          for f in dist/*.html; do
            [ -f "$f" ] || continue
            html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              --remove-optional-tags \
              --remove-redundant-attributes \
              --remove-script-type-attributes \
              --remove-tag-whitespace \
              --use-short-doctype \
              --minify-css true \
              --minify-js true \
              -o "$f" "$f" 2>/dev/null || echo "  Could not minify $f (skipping)"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Success
        run: echo "Deployed to ${{ steps.deployment.outputs.page_url }}"
